name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: ./mvnw package -DskipTests

      - name: Build and push Docker image
        run: |
          echo "${{ secrets.ACCESS_TOKEN }}" | docker login ghcr.io -u ppattana-iu --password-stdin
          docker build -t ghcr.io/ppattana-iu/ducks-service:latest --file Dockerfile .
          docker push ghcr.io/ppattana-iu/ducks-service:latest
